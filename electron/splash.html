<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cargando...</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        overflow: hidden; /* 🚫 quita scroll */
        display: flex;
        align-items: center;
        justify-content: center;

        font-family: 'Segoe UI', sans-serif;

        /* 🎨 fondo degradado */
        background: linear-gradient(135deg, #7a0c0c, #0b3d91);
        color: #fff;
      }

      .container {
        text-align: center;
        animation: fadeIn 0.6s ease;
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
      }

      /* 🏛 LOGO */
      .logo {
        width: 100px;
        margin-bottom: 20px;
        animation: float 3s ease-in-out infinite;
      }

      h2 {
        font-weight: 600;
        margin-bottom: 10px;
        letter-spacing: 1px;
      }

      #msg {
        color: #cbd5f5;
        font-size: 14px;
      }

      /* 🔄 SPINNER */
      .spinner {
        margin: 25px auto 0;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #38bdf8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      /* ✨ ANIMACIONES */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- 🖼 LOGO -->
      <img src="./assets/logo.png" class="logo" />

      <h2>Postgrado Contaduría</h2>

      <p id="msg">Iniciando...</p>

      <!-- 🔄 CARGA -->
      <div class="spinner"></div>
    </div>

    <script>
      const { ipcRenderer } = require('electron');

      ipcRenderer.on('msg', (_, text) => {
        document.getElementById('msg').innerText = text;
      });
    </script>
  </body>
</html>
